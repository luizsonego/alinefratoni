version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: estudio-aline
    restart: unless-stopped
    environment:
      POSTGRES_DB: estudio-aline
      POSTGRES_USER: estudio-aline
      POSTGRES_PASSWORD: estudio-pass
    ports:
      - "5438:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U convites_user" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:


